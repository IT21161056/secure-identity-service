name: Build and Deploy to Azure Container Instances

on:
  push:
    branches: [main]
  pull_request:
    branches: [development]

env:
  RESOURCE_GROUP: your-resource-group
  ACR_NAME: your-acr-name
  ACI_NAME: your-aci-name
  LOCATION: eastus # Change to your preferred region

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build and push Docker image to ACR
      - name: Build and push image to ACR
        run: |
          # Build the Docker image
          docker build -t $ACR_NAME.azurecr.io/$ACI_NAME:${{ github.sha }} .

          # Login to ACR
          az acr login --name $ACR_NAME

          # Push the image
          docker push $ACR_NAME.azurecr.io/$ACI_NAME:${{ github.sha }}

      # Deploy to Azure Container Instances
      - name: Deploy to Azure Container Instances
        run: |
          # Check if container instance exists
          if az container show --resource-group $RESOURCE_GROUP --name $ACI_NAME --query name -o tsv; then
            # Update existing container
            az container update \
              --resource-group $RESOURCE_GROUP \
              --name $ACI_NAME \
              --image $ACR_NAME.azurecr.io/$ACI_NAME:${{ github.sha }}
          else
            # Create new container instance
            az container create \
              --resource-group $RESOURCE_GROUP \
              --name $ACI_NAME \
              --image $ACR_NAME.azurecr.io/$ACI_NAME:${{ github.sha }} \
              --cpu 1 \
              --memory 1.5 \
              --ports 5000 \
              --dns-name-label $ACI_NAME \
              --registry-login-server $ACR_NAME.azurecr.io \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --environment-variables \
                NODE_ENV="production" \
                PORT="5000" \
                API_BASE_URL="/api/v1" \
              --secure-environment-variables \
                MONGO_URL="${{ secrets.MONGO_URL }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
                REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}"
          fi
