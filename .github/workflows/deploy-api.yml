name: Deploy Node API to OceanGate

on:
  workflow_dispatch:
  push:
    branches:
      - development
    # paths:
    #   - identity-service/**
    #   - .github/workflows/deploy-api.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Navigate to API folder and install dependencies
        working-directory: ./identity-service # Change to your API folder
        run: npm install

      - name: Build the API (if needed)
        working-directory: ./identity-service
        run: npm run build # Update with your build command if applicable


